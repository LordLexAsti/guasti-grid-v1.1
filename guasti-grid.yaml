## 5. GRAPHS — Decision vs Repair

### 5.1 Decision Graph

```yaml
Graph_Decision:
  symbol: "𝒢_D = (𝒜 \\ {V}, E_D)"
  
  definition: |
    Directed graph where nodes are non-victim actors,
    edges represent causal/decisional contribution.
  
  canonical_chain: |
    F →^{R^plan} G →^{R^auth} C →^{R^design} K →^{R^command} O →^{R^exec} ℓ → V
    
    Alternative paths (parallel):
      G →^{R^plan} C (doctrine informs design)
      K ←^{R^command} G (commander receives ROE from govt)
    
  invariant: |
    M (machine) is NEVER a node in 𝒢_D.
    M appears as an edge label (info flow), never as decision node.
    
    Example:
      O →^{M_info} recommendation (machine informs)
      but O →^{M_executes} action is FORBIDDEN
```

### 5.2 Repair Graph

```yaml
Graph_Repair:
  symbol: "𝒢_P = (𝒜, E_P)"
  
  definition: |
    Directed graph where edges lead FROM actors TO victims V,
    labeled by repair obligations π(i).
  
  canonical_structure: |
    F →^{P^structural} V
    C →^{P^structural, P^material} V
    G →^{P^truth, P^symbolic, P^structural} V
    K →^{P^truth, P^structural} V
    O →^{P^truth} V
    
    (V has no outgoing edges — victims are sinks in repair graph)
  
  invariant: |
    ∀ℓ ∈ 𝒵 : ∃ path from V to {F,G} labeled (P^truth ∪ P^structural)
    
    This ensures: "continuité des pouvoirs publics"
    Even if intermediate nodes disappear, V can reach the state.
    
  consequence: |
    If no path from V back to state authority ⟹ Ubuntu impossible.
    No "us" remains recoverable.
```

