## 3. RESPONSIBILITY PREDICATE

### 3.1 Definition

```yaml
Responsibility_Predicate:
  formula: "Resp(x, ℓ) ⟺ Addr(x, V) ∧ Imput(x, ℓ) ∧ Cap(x)"
  
  Components:
    Addr_x_V: |
      "Adressability: x can be questioned by V (victims/courts/public)"
      "Why did you decide? On what authority? By what norm?"
    
    Imput_x_l: |
      "Imputability: act ℓ is causally/morally traceable to x"
      "Not a 'cloud of causation', not algorithmic diffusion"
    
    Cap_x: |
      "Capacity: x had real power to refuse/redirect at the moment"
      "Not theoretical, not cosmetic, not under coercion"

Meaning: |
  An actor x is responsible for lethal act ℓ if and only if:
  - Someone can address them morally/legally
  - The act is imputable to them (not to 'the machine')
  - They had real capacity to say NO
  
  Missing any one ⟹ x is not truly responsible (cosmetic responsibility)
```

