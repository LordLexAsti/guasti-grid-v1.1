## 6. COLUMN OF AN ACT — Completeness Metric

### 6.1 Column Definition

```yaml
Column_Definition:
  formula: "Col(ℓ) := { n ∈ {F,C,G,K,O} | n causally pertinent to ℓ }"
  
  meaning: |
    For any lethal act ℓ, the "column" is the minimal set of human actors
    whose contribution was necessary.
    
    NOT the set of all humans involved (too broad).
    The DIVISORS of the act (in Guasti sense).
  
  example_autonomous_drone: |
    Act ℓ = "drone fires at target in urban zone"
    
    Supposedly autonomous:
      Col(ℓ) should include {C, G, K} at minimum (doctrine, design, activation)
      
    But if interface is opaque + pressure high + K unavailable:
      O becomes "divisor by default" (blame lands here)
      Yet O had κ_O < τ (no real capacity)
      
    ⟹ Column is INCOMPLETE (O cannot truly be divisor)
    ⟹ System is pathological
```

### 6.2 Completeness Score Ω(ℓ)

```yaml
Omega_Definition:
  formula: "Ω(ℓ) := |Col(ℓ)| / 5"
  
  range: "[0, 1]"
  
  interpretation: |
    Ω = 1.0  ⟹ All five divisors (F,C,G,K,O) are pertinent
    Ω = 0.8  ⟹ Four divisors (e.g., missing F)
    Ω = 0.6  ⟹ Three divisors
    Ω = 0.4  ⟹ Two divisors (dangerous: too few)
    Ω = 0.2  ⟹ One divisor (catastrophic: blame one person)
    Ω = 0.0  ⟹ No human divisors (act is fully autonomous)
  
  decision_rule: |
    Ω < 0.6  ⟹ System is NOT Ubuntu-compatible
    Ω ≥ 0.8  ⟹ System has good accountability structure
```

### 6.3 Admissibility Score Ψ(ℓ)

```yaml
Psi_Definition:
  formula: "Ψ(ℓ) := Ω(ℓ) · 𝟙[AuditPossible(ℓ)] · 𝟙[∃Repair_Path] · 𝟙[Addr ⊇ {A,H}]"
  
  components:
    Omega: "Column completeness (0 to 1)"
    
    AuditPossible: |
      Can an independent body reconstruct the chain?
      Requires: logs, decision traces, non-black-box AI
      Binary: 1 if yes, 0 if impossible
    
    Repair_Path: |
      Does a path V → state authority exist?
      Binary: 1 if G or F reachable, 0 if V is orphaned
    
    DoubleAudience: |
      Are both A (citizens) and H (humanity) in the accountability loop?
      Binary: 1 if yes, 0 if only domestic audience

  interpretation: |
    Ψ = 1.0  ⟹ Act is fully Ubuntu-compatible
               All columns visible, auditable, reparable, universally answerable
    
    Ψ = 0.7  ⟹ Mostly good, some gaps (e.g., audit partial)
    
    Ψ = 0.4  ⟹ Major failures: completeness low OR repair path missing
    
    Ψ = 0.0  ⟹ System is ontologically orphaned
               No responsible subject, no audit, no repair, no universal answer

  decision_rule: |
    Ψ < 0.6  ⟹ ACT IS FORBIDDEN (not Ubuntu-compatible)
    Ψ ≥ 0.7  ⟹ ACT IS ADMISSIBLE (with conditions)
```

