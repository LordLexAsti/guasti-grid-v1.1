## 4. AXIOMS

### 4.1 Axiom A — Ubuntu's Core (Non-Delegation to AI)

```yaml
Axiom_A_NonDelegation:
  formula: "∀ℓ ∈ 𝒵_lethal : ¬∃ a ∈ IA : Resp(a, ℓ)"
  
  meaning: |
    For every lethal act ℓ, there does NOT exist an AI/machine a
    that bears moral/legal responsibility.
    
    The machine CANNOT satisfy Resp(x,ℓ) because:
    - M is not addressable (no tribunal can question a rock)
    - M has no moral intentionality
    - M cannot be pardoned or reformed
    
  consequence: |
    "c'est l'IA qui a tiré" is a type error, not a description.
    It attempts to assign responsibility to a non-responsible entity.
    
    This is ontologically forbidden.
```

### 4.2 Axiom B — Phantom Interdiction

```yaml
Axiom_B_PhantomInterdiction:
  formula: "∀ℓ ∈ 𝒵_lethal : ∃x ∈ {F,C,G,K,O} : Resp(x, ℓ)"
  
  meaning: |
    Every lethal act must have at least ONE identifiable human/institutional
    subject who bears responsibility.
    
    No "event without author."
    No technical accident that dissolves into diffusion.
    
  consequence: |
    If all five human divisors fail Resp(x,ℓ), then the system is:
    - Ontologically orphaned
    - Morally unrecoverable
    - Not Ubuntu-compatible by construction
```

### 4.3 Axiom C — Double Audience (Ubuntu Beyond Borders)

```yaml
Axiom_C_DoubleAudience:
  formula: "∀x ∈ {F,C,G,K,O} : Addr(x) ⊇ {A, H}"
  
  meaning: |
    Every actor must be accountable to TWO audiences:
    - A (Administrés): the political community (citizens)
    - H (Humanité): broader humanity (including enemy, foreigners, future generations)
    
  implication_for_war: |
    Even when political "us" is broken (war ≠ peace),
    the universal "us" (humanity) cannot be broken.
    
    Enemy may be excluded from A (political), never from H (human).
    
  operationalization: |
    Before war: justify to A + H (political + moral accountability)
    During war: apply DIH (distinction, proportionality) = protecting H
    After war: Truth Commission = restoring relation to H (if not to A)
```

### 4.4 Axiom D — Capacity Floor (Anti-Cosmetic Responsibility)

```yaml
Axiom_D_CapacityFloor:
  formula: "κ_O ≥ τ  ∨  Resp(O, ℓ) := ⊥"
  
  meaning: |
    If operator's real capacity to refuse is below threshold τ,
    then operator is NOT truly responsible.
    Responsibility ESCALATES to K, C, G.
    
  τ_components:
    time: "Minimum deliberation time (not coerced by tempo)"
    info: "Access to raw data, uncertainties, alternatives"
    legal: "Right to refuse without retaliation risk"
    hierarchy: "No implicit coercion ('disobey and be fired')"
    interface: "Symmetric UI (equal friction on YES and NO)"
  
  consequence_if_κ_O_low: |
    O becomes a "tampon" (buffer absorbing blame).
    Imputability automatically redistributes:
    
    κ_O < τ  ⟹  Resp(K, ℓ)↑  ∧  Resp(C, ℓ)↑  ∧  Resp(G, ℓ)↑
    
    Cannot stop at O. Must audit K, G, C FIRST.
```

### 4.5 Axiom E — Enforcement Dual-Leg

```yaml
Axiom_E_EnforcementDualLeg:
  formula: "∀Resp(x,ℓ) : (Leg_internal(x) ≠ ∅) ∧ (Leg_external(x) ≠ ∅)"
  
  Leg_Internal: |
    DIH Article 91 (Protocole additionnel I):
      "The Party to the conflict shall be liable to pay compensation
       for loss or damage caused by violations of this Protocol."
    
    French law (Code pénal 122-4):
      "An order from authority does NOT justify act if order
       is manifestly illegal."
    
    Control mechanisms:
      - Parlement (budget votes, investigations)
      - Juge administratif (Conseil d'État)
      - Juge pénal (if gross violation)
      - Internal discipline
  
  Leg_External: |
    International pressure:
      - Alliance conditions (NATO interoperability)
      - Export controls
      - Reputation damage
      - UN mechanisms (not perfect, but real)
    
    Normative anchors:
      - DIH consensus (not backed by sheriff, but by community)
      - Precedent (Nuremberg, Rwanda, Yugoslavia)

  Consequence: |
    Responsibility is NOT toothless (internal levers exist).
    But enforcement is imperfect (accept this realism).
    
    Dual-leg prevents fantasy of perfect justice,
    while preventing fantasy of zero accountability.
```

