## 2. NODES — Formal Typing

### 2.1 Node Definition

```yaml
Node_Definition: |
  N_i := (i, ρ(i), π(i), κ_i)
  
  where:
    i ∈ 𝒜           = actor label
    ρ(i) ⊆ ℛ         = set of responsibilities
    π(i) ⊆ 𝒫         = set of repair obligations
    κ_i ∈ [0,1]      = real capacity to refuse/redirect
```

