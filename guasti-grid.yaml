## 9. TEMPO MATRIX — Graceful Degradation

### 9.1 Three Levels

```yaml
Tempo_Framework:
  principle: |
    "Responsibility structure degrades GRACEFULLY under operational stress,
     but NEVER loses the invariant: someone remains namnably responsible."

Level_1_Peace_LowIntensity:
  triggers: "1–5 incidents per day, normal operational tempo"
  
  interface: FULL
    - Full situational display (all systems)
    - All alternatives shown
    - Deliberative friction (time to think)
    - Escalation to K is routine
    - Post-action documentation is comprehensive
  
  dialogue_and_repair: FULL
    - Commissions mix with populations
    - 30–90 day resolution expected
    - Victims participate in fact-finding
  
  Ubuntu_status: STRONG
    - All five divisors are visible and active (Ω ≈ 1.0)
    - Ψ ≈ 0.9 (mostly admissible)
  
  responsibility_model: "Full accountability. All Resp(x,ℓ) can be substantive."

Level_2_MediumIntensity:
  triggers: "5–20 incidents per day, sustained operations"
  
  interface: SIMPLIFIED
    - Core maintained: alternatives, refusal rights, decision block
    - Secondary displays deferred
    - UI asymmetry tolerated (slightly faster YES path)
    - Escalation to K is still possible but streamlined
    - Logging non-negotiable (even if post-processing deferred)
  
  dialogue_and_repair: DEFERRED
    - Systematic but delayed (7–14 days for standard incidents)
    - Truth commissions during conflict, not after
    - Post-conflict review of incidents
  
  Ubuntu_status: MAINTAINED (with STRAIN)
    - Divisors F,C,G,K remain visible
    - O remains a divisor IF Λ_O(ℓ) ≥ 0.5
    - Ω ≈ 0.75–0.8 (most divisors intact)
    - Ψ ≈ 0.6–0.7 (admissible but stressed)
  
  invariant: "Someone named remains responsible. Dialogue remains possible."

Level_3_HighIntensity_War:
  triggers: "20+ incidents per day, chaos, survival-mode operations"
  
  interface: MINIMAL
    - Only: "I DOUBT" button → escalates immedia
