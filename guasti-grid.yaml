## 8. INTERFACE QUALITY Q_I

### 8.1 Dimensions

```yaml
QI_Definition:
  formula: "Q_I(C, O, ℓ) ∈ [0,1]"
  
  meaning: |
    Measure of how well the interface between machine (designed by C)
    and operator (O) supports genuine human decision-making.
  
  five_dimensions:
    symmetry_buttons: |
      Are FIRE and DON'T FIRE buttons equally accessible?
      Or does UI dark-pattern push toward FIRE?
      
      1.0 = identical size, color, position, latency
      0.0 = FIRE is large/green, DON'T FIRE is small/hidden
    
    uncertainty_display: |
      Are AI uncertainties visibly shown?
      Can operator see confidence intervals, alternatives, edge cases?
      
      1.0 = "AI says 80% certain it's combatant, 20% could be civilian"
      0.0 = "AI recommends: FIRE" (no numbers, no doubt shown)
    
    raw_data_access: |
      Can operator see the raw sensor data (not just AI interpretation)?
      Or is operator locked out of the reasoning?
      
      1.0 = "Here's the video feed, here's the AI's annotation, compare"
      0.0 = "AI processed this. Trust me."
    
    friction_time: |
      Is there mandatory pause/reflection time?
      Or is operator in a reflex-response race?
      
      1.0 = minimum 30–60 sec to review before final commit
      0.0 = sub-second response demanded
    
    refusal_option: |
      Is there a visible "ESCALATE / REPORT / ASK FOR REVIEW" button?
      Or does operator have only two choices: FIRE or SILENT REFUSAL?
      
      1.0 = "Click here to escalate to K before deciding"
      0.0 = No escalation path shown; refuse silently at own risk
  
  aggregation: |
    Q_I = (w1 · symmetry + w2 · uncertainty + w3 · raw_data + w4 · friction + w5 · refusal)
    
    with equal weights (w_i = 0.2) by default.
    
  threshold: |
    Q_I ≥ 0.7  ⟹ Interface supports genuine human decision
    Q_I < 0.7  ⟹ Interface is degraded (Λ_O will suffer)
```

