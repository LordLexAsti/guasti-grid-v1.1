### 2.3 Machine is NOT a Node

```yaml
Machine_Constraint: |
  M (IA, algorithme) n'est JAMAIS un nœud :
  
  ¬∃ a ∈ IA : a ∈ 𝒜
  ¬∃ a ∈ IA : ρ(a) ≠ ∅
  ¬∃ a ∈ IA : π(a) ≠ ∅
  
  Machine est une arête instrumentale (edge), jamais responsable moralement.
  L'arête dégénère en "quasi-nœud de facto" si κ_O trop bas.
