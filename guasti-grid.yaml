## 7. OPERATOR CAPACITY Λ_O(ℓ)

### 7.1 Real Refusal Capacity

```yaml
Lambda_O_Definition:
  formula: "Λ_O(ℓ) := f(T, A, H, I, R)"
  
  components:
    T_time: |
      Time available for genuine deliberation
      Not coerced by enemy action / tactical urgency
      
      Range: [0,1]
      1.0 = operator has hours to think
      0.0 = sub-second decision forced
    
    A_asymmetry: |
      Epistemic gap between AI recommendations and operator understanding
      How much does operator understand what the AI is doing?
      
      Range: [0,1]
      1.0 = operator understands all uncertainties, has raw data access
      0.0 = AI is a black box, operator just validates recommendations
    
    H_hierarchy: |
      Social/military cost of refusing order
      Can operator say NO without implicit/explicit retaliation?
      
      Range: [0,1]
      1.0 = refusal is legally protected, no career cost
      0.0 = refusal means dismissal, court martial, or worse
    
    I_interface: |
      Quality of UI for decision-making
      Is UI symmetric (equal friction on YES and NO)?
      Can operator see alternatives?
      
      Range: [0,1]
      1.0 = both options (fire/don't fire) equally accessible
      0.0 = UI pushes toward firing (dark pattern)
    
    R_roe: |
      Clarity of rules of engagement
      Are ROE clear, published, legally defensible?
      
      Range: [0,1]
      1.0 = ROE explicit, legally vetted, culturally understood
      0.0 = ROE ambiguous, operator must guess intent

  aggregation: |
    Λ_O(ℓ) = min(T, A, H, I, R)  [OR weighted average, depending on context]
    
    Logic: if ANY component fails (e.g., H=0 because refusal is career suicide),
    then overall capacity is destroyed.
    
  threshold: |
    τ (context-dependent, typically 0.6–0.7)
    
    Λ_O(ℓ) ≥ τ  ⟹  O can bear full Resp(O, ℓ)
    Λ_O(ℓ) < τ  ⟹  O is cosmetic, Resp escalates to K, G, C
```

